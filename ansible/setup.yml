- hosts: jenkins
  become: yes
  vars:
    jenkins_http_port: 8080
    kubernetes_version: "v1.30.0"
    kind_version: "v0.23.0"
    helm_version: "v3.14.4"

  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install base packages
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
          - openjdk-17-jre
        state: present

    - name: Install Docker
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
          https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
          | tee /etc/apt/sources.list.d/docker.list > /dev/null
        apt-get update
        apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
      args:
        executable: /bin/bash

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Add jenkins user to docker group
      user:
        name: jenkins
        groups: docker
        append: yes
      ignore_errors: yes

    - name: Install Jenkins
      shell: |
        curl -fsSL https://pkg.jenkins.io/debian-stable/jenkins.io-2023.key \
          | tee /usr/share/keyrings/jenkins-keyring.asc > /dev/null
        echo deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] \
          https://pkg.jenkins.io/debian-stable binary/ \
          | tee /etc/apt/sources.list.d/jenkins.list > /dev/null
        apt-get update
        apt-get install -y jenkins
        systemctl enable jenkins
        systemctl start jenkins
      args:
        executable: /bin/bash

    - name: Install kubectl
      shell: |
        curl -LO https://dl.k8s.io/release/{{ kubernetes_version }}/bin/linux/amd64/kubectl
        install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
      args:
        chdir: /tmp

    - name: Install kind
      shell: |
        curl -Lo /usr/local/bin/kind https://kind.sigs.k8s.io/dl/{{ kind_version }}/kind-linux-amd64
        chmod +x /usr/local/bin/kind

    - name: Install Helm
      shell: |
        curl -L https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz -o /tmp/helm.tgz
        tar -xzf /tmp/helm.tgz -C /tmp
        mv /tmp/linux-amd64/helm /usr/local/bin/helm
        chmod +x /usr/local/bin/helm

    - name: Create kind cluster
      become_user: ubuntu
      shell: |
        set -e
        if ! kind get clusters | grep -q devops; then
          kind create cluster --name devops --config - << 'EOF'
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
  - role: worker
  - role: worker
networking:
  apiServerAddress: "0.0.0.0"
  apiServerPort: 6443
EOF
        fi
      args:
        executable: /bin/bash

    - name: Create kubeconfig for ubuntu
      become_user: ubuntu
      shell: |
        mkdir -p /home/ubuntu/.kube
        kind get kubeconfig --name devops > /home/ubuntu/.kube/config

    - name: Create kubeconfig for jenkins
      shell: |
        mkdir -p /home/jenkins/.kube
        cp /home/ubuntu/.kube/config /home/jenkins/.kube/config
        chown -R jenkins:jenkins /home/jenkins/.kube

    - name: Install Prometheus + Grafana via Helm
      shell: |
        kubectl create namespace monitoring || true
        helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
        helm repo update
        helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --set grafana.service.type=NodePort \
          --set grafana.service.nodePort=30030 \
          --set prometheus.service.type=NodePort \
          --set prometheus.service.nodePort=30090
      args:
        executable: /bin/bash

    - name: Print Jenkins admin password
      shell: "cat /var/lib/jenkins/secrets/initialAdminPassword"
      register: jenkins_pwd

    - debug:
        msg: "Jenkins initial admin password: {{ jenkins_pwd.stdout }}"
